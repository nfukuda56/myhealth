<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>食事ログ 移行ツール</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --accent: #4ade80;
    --accent-dim: #1a3d27;
    --danger: #f87171;
    --danger-dim: #3d1a1a;
    --warn: #fbbf24;
    --warn-dim: #3d2e0a;
    --text: #e2e8f0;
    --text-muted: #64748b;
    --mono: 'DM Mono', monospace;
    --sans: 'Noto Sans JP', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-weight: 300;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container { max-width: 760px; margin: 0 auto; }

  header {
    border-left: 3px solid var(--accent);
    padding-left: 1rem;
    margin-bottom: 2.5rem;
  }
  header h1 {
    font-family: var(--mono);
    font-size: 1.1rem;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.05em;
  }
  header p {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 0.3rem;
    font-family: var(--mono);
  }

  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.5rem;
    margin-bottom: 1.2rem;
  }

  .section-title {
    font-family: var(--mono);
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Stats row */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.75rem;
    margin-bottom: 1.5rem;
  }
  .stat {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.75rem;
    text-align: center;
  }
  .stat-val {
    font-family: var(--mono);
    font-size: 1.4rem;
    font-weight: 500;
    color: var(--accent);
    line-height: 1;
  }
  .stat-label {
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-top: 0.3rem;
  }

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.6rem 1.1rem;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.15s;
  }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-primary {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }
  .btn-primary:hover:not(:disabled) { background: var(--accent); color: #0f1117; }

  .btn-danger {
    background: var(--danger-dim);
    border-color: var(--danger);
    color: var(--danger);
  }
  .btn-danger:hover:not(:disabled) { background: var(--danger); color: #0f1117; }

  .btn-warn {
    background: var(--warn-dim);
    border-color: var(--warn);
    color: var(--warn);
  }
  .btn-warn:hover:not(:disabled) { background: var(--warn); color: #0f1117; }

  /* File input */
  .file-area {
    border: 1px dashed var(--border);
    border-radius: 6px;
    padding: 1.2rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s;
    position: relative;
  }
  .file-area:hover { border-color: var(--accent); }
  .file-area input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%;
  }
  .file-area p { font-size: 0.8rem; color: var(--text-muted); }
  .file-area .file-name {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--accent);
    margin-top: 0.4rem;
  }

  /* Date filter */
  .date-row {
    display: flex;
    gap: 0.75rem;
    align-items: center;
    flex-wrap: wrap;
    margin-top: 1rem;
  }
  .date-row label { font-size: 0.78rem; color: var(--text-muted); }
  .date-row input[type=date] {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.8rem;
    padding: 0.4rem 0.6rem;
  }

  /* Progress */
  .progress-wrap {
    background: var(--border);
    border-radius: 4px;
    height: 4px;
    margin: 1rem 0;
    overflow: hidden;
    display: none;
  }
  .progress-bar {
    height: 100%;
    width: 0%;
    background: var(--accent);
    transition: width 0.2s;
    border-radius: 4px;
  }

  /* Log */
  .log {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.75rem 1rem;
    font-family: var(--mono);
    font-size: 0.73rem;
    line-height: 1.8;
    max-height: 240px;
    overflow-y: auto;
    display: none;
    margin-top: 0.75rem;
  }
  .log-ok  { color: var(--accent); }
  .log-err { color: var(--danger); }
  .log-info{ color: var(--text-muted); }

  /* Confirm modal */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--danger);
    border-radius: 10px;
    padding: 2rem;
    max-width: 380px;
    width: 90%;
    text-align: center;
  }
  .modal h3 { font-family: var(--mono); color: var(--danger); margin-bottom: 0.75rem; }
  .modal p  { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1.5rem; }
  .modal-btns { display: flex; gap: 0.75rem; justify-content: center; }

  .divider { height: 1px; background: var(--border); margin: 0.75rem 0; }

  .action-row {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    align-items: center;
    margin-top: 1rem;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>health / migration tool</h1>
    <p>食事ログ データ移行ユーティリティ — myhealth @ Supabase</p>
  </header>

  <!-- 現在のDB状況 -->
  <div class="section">
    <div class="section-title">現在のDB状況</div>
    <div class="stats">
      <div class="stat"><div class="stat-val" id="st-total">—</div><div class="stat-label">総件数</div></div>
      <div class="stat"><div class="stat-val" id="st-breakfast">—</div><div class="stat-label">朝食</div></div>
      <div class="stat"><div class="stat-val" id="st-lunch">—</div><div class="stat-label">昼食</div></div>
      <div class="stat"><div class="stat-val" id="st-dinner">—</div><div class="stat-label">夕食</div></div>
    </div>
    <div style="display:flex; gap:0.5rem; font-family:var(--mono); font-size:0.72rem; color:var(--text-muted); margin-bottom:0.75rem;" id="st-range">
      期間: —
    </div>
    <button class="btn btn-primary" onclick="loadStats()">↻ 更新</button>
  </div>

  <!-- 一括削除 -->
  <div class="section">
    <div class="section-title">⚠ 全件削除</div>
    <p style="font-size:0.82rem; color:var(--text-muted); margin-bottom:1rem;">
      mealsテーブルの全データを削除します。CSVの再取込前に実行してください。
    </p>
    <button class="btn btn-danger" onclick="confirmDelete()">全件削除</button>
  </div>

  <!-- CSV一括取込 -->
  <div class="section">
    <div class="section-title">CSV 一括取込</div>
    <div class="file-area" id="file-area">
      <input type="file" accept=".csv" id="csv-file" onchange="onFileSelect(event)">
      <p>Notionエクスポート CSVをドロップ or クリックして選択</p>
      <div class="file-name" id="file-name"></div>
    </div>

    <div class="divider"></div>

    <!-- 日付フィルター -->
    <div style="font-size:0.78rem; color:var(--text-muted); margin-bottom:0.5rem;">
      日付フィルター（空欄 = 全件取込）
    </div>
    <div class="date-row">
      <label>開始日</label>
      <input type="date" id="date-from">
      <label>終了日</label>
      <input type="date" id="date-to">
      <button class="btn btn-warn" style="font-size:0.72rem; padding:0.35rem 0.7rem;" onclick="clearDates()">クリア</button>
    </div>

    <div class="action-row">
      <button class="btn btn-primary" id="import-btn" onclick="startImport()" disabled>取込実行</button>
      <span style="font-size:0.75rem; color:var(--text-muted);" id="preview-count"></span>
    </div>

    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div class="log" id="import-log"></div>
  </div>

</div>

<!-- 削除確認モーダル -->
<div class="modal-overlay" id="delete-modal">
  <div class="modal">
    <h3>⚠ 全件削除の確認</h3>
    <p>mealsテーブルの全データを削除します。<br>この操作は取り消せません。</p>
    <div class="modal-btns">
      <button class="btn btn-danger" onclick="executeDelete()">削除する</button>
      <button class="btn" style="border-color:var(--border);color:var(--text-muted);" onclick="closeModal()">キャンセル</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://lvmgfolwipwgyhhzskvj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx2bWdmb2x3aXB3Z3loaHpza3ZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMzgxMjQsImV4cCI6MjA5NTkxNDEyNH0.jrnrNWLZDQg2mscPqI-UPg9JrQZhXFkJVELl1TG43Gk';

const headers = {
  'apikey': SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'Content-Type': 'application/json',
  'Prefer': 'return=minimal'
};

let parsedRows = [];

// ── Stats ──────────────────────────────────────────
async function loadStats() {
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/rpc/meals_summary`, {
      method: 'POST', headers
    });
    // fallback: direct query
    const q = await fetch(
      `${SUPABASE_URL}/rest/v1/meals?select=meal_type,eaten_at`,
      { headers: { ...headers, 'Prefer': '' } }
    );
    const rows = await q.json();
    const total = rows.length;
    const bf = rows.filter(r => r.meal_type === 'breakfast').length;
    const lu = rows.filter(r => r.meal_type === 'lunch').length;
    const di = rows.filter(r => r.meal_type === 'dinner').length;
    document.getElementById('st-total').textContent = total;
    document.getElementById('st-breakfast').textContent = bf;
    document.getElementById('st-lunch').textContent = lu;
    document.getElementById('st-dinner').textContent = di;
    if (total > 0) {
      const dates = rows.map(r => r.eaten_at).sort();
      const from = dates[0].slice(0,10);
      const to   = dates[dates.length-1].slice(0,10);
      document.getElementById('st-range').textContent = `期間: ${from} 〜 ${to}`;
    } else {
      document.getElementById('st-range').textContent = '期間: データなし';
    }
  } catch(e) {
    document.getElementById('st-total').textContent = 'ERR';
    console.error(e);
  }
}

// ── CSV Parse ──────────────────────────────────────
const MEAL_MAP = { '朝食':'breakfast','昼食':'lunch','夕食':'dinner','間食':'snack' };

function parseDatetime(s) {
  s = s.trim();
  const m = s.match(/(\d+)年(\d+)月(\d+)日(?:\s+(\d+):00\s*\(JST\))?/);
  if (!m) return null;
  const [,y,mo,d,h] = m;
  return `${y}-${mo.padStart(2,'0')}-${d.padStart(2,'0')}T${(h||'00').padStart(2,'0')}:00:00+09:00`;
}

function parseCSV(text) {
  const lines = text.split('\n').filter(l => l.trim());
  const header = lines[0].split(',');
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    // naive split (Notion CSV doesn't quote fields typically)
    const cols = lines[i].split(',');
    if (cols.length < 2) continue;
    const eaten_at = parseDatetime(cols[0]);
    if (!eaten_at) continue;
    const meal_type = MEAL_MAP[cols[1]?.trim()] || 'snack';
    const menu_name  = cols[2]?.trim() || null;
    const content    = cols[3]?.trim() || null;
    const weight_g   = parseFloat(cols[4]) || null;
    const cal        = parseFloat(cols[5]) || null;
    const protein_g  = parseFloat(cols[6]) || null;
    const fat_g      = parseFloat(cols[7]) || null;
    const carbs_g    = parseFloat(cols[8]) || null;
    rows.push({ eaten_at, meal_type,
      menu_name: menu_name || null,
      content:   content   || null,
      weight_g, calories_kcal: cal, protein_g, fat_g, carbs_g
    });
  }
  return rows;
}

function onFileSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('file-name').textContent = file.name;
  const reader = new FileReader();
  reader.onload = ev => {
    parsedRows = parseCSV(ev.target.result);
    updatePreview();
    document.getElementById('import-btn').disabled = false;
  };
  reader.readAsText(file, 'UTF-8');
}

function getFilteredRows() {
  const from = document.getElementById('date-from').value;
  const to   = document.getElementById('date-to').value;
  return parsedRows.filter(r => {
    const d = r.eaten_at.slice(0,10);
    if (from && d < from) return false;
    if (to   && d > to)   return false;
    return true;
  });
}

function updatePreview() {
  const filtered = getFilteredRows();
  document.getElementById('preview-count').textContent =
    `取込予定: ${filtered.length} 件 / CSV全体: ${parsedRows.length} 件`;
}

function clearDates() {
  document.getElementById('date-from').value = '';
  document.getElementById('date-to').value = '';
  updatePreview();
}

document.getElementById('date-from').addEventListener('change', updatePreview);
document.getElementById('date-to').addEventListener('change', updatePreview);

// ── Import ─────────────────────────────────────────
async function startImport() {
  const rows = getFilteredRows();
  if (!rows.length) { alert('取込対象がありません'); return; }

  const btn = document.getElementById('import-btn');
  btn.disabled = true;
  btn.textContent = '取込中...';

  const pw = document.getElementById('progress-wrap');
  const pb = document.getElementById('progress-bar');
  const logEl = document.getElementById('import-log');
  pw.style.display = 'block';
  logEl.style.display = 'block';
  logEl.innerHTML = '';

  let inserted = 0, skipped = 0, errors = 0;
  const CHUNK = 50;

  for (let i = 0; i < rows.length; i += CHUNK) {
    const chunk = rows.slice(i, i + CHUNK);
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/meals`, {
        method: 'POST',
        headers: { ...headers, 'Prefer': 'return=minimal,resolution=ignore-duplicates' },
        body: JSON.stringify(chunk)
      });
      if (res.ok) {
        inserted += chunk.length;
        appendLog(`✓ ${i+1}〜${Math.min(i+CHUNK, rows.length)} 件目 INSERT OK`, 'ok');
      } else {
        const err = await res.text();
        errors += chunk.length;
        appendLog(`✗ エラー: ${err}`, 'err');
      }
    } catch(e) {
      errors += chunk.length;
      appendLog(`✗ ネットワークエラー: ${e.message}`, 'err');
    }
    pb.style.width = Math.round((Math.min(i+CHUNK, rows.length)) / rows.length * 100) + '%';
  }

  appendLog('', 'info');
  appendLog(`完了 — 取込: ${inserted}件 / エラー: ${errors}件`, inserted > 0 ? 'ok' : 'err');
  btn.textContent = '取込実行';
  btn.disabled = false;
  loadStats();
}

function appendLog(msg, cls) {
  const el = document.getElementById('import-log');
  el.innerHTML += `<div class="log-${cls}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

// ── Delete ─────────────────────────────────────────
function confirmDelete() {
  document.getElementById('delete-modal').classList.add('show');
}
function closeModal() {
  document.getElementById('delete-modal').classList.remove('show');
}
async function executeDelete() {
  closeModal();
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/meals?id=gte.0`, {
      method: 'DELETE', headers
    });
    if (res.ok) {
      alert('全件削除しました');
      loadStats();
    } else {
      const e = await res.text();
      alert('削除エラー: ' + e);
    }
  } catch(e) {
    alert('ネットワークエラー: ' + e.message);
  }
}

// ── Init ───────────────────────────────────────────
loadStats();
</script>
</body>
</html>
