<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン — myhealth</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-wrap {
      width: 100%;
      max-width: 360px;
      padding: 0 24px;
    }
    .login-logo {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: 0.1em;
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .login-logo::before {
      content: '';
      display: inline-block;
      width: 3px;
      height: 16px;
      background: var(--accent);
      border-radius: 2px;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px;
    }
    .login-card h1 {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 4px;
    }
    .login-card p {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 24px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 14px;
    }
    .form-label {
      font-size: 11px;
      color: var(--text-muted);
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .form-group input {
      width: 100%;
      padding: 10px 12px;
    }
    .login-btn {
      width: 100%;
      padding: 11px;
      background: var(--accent);
      color: #0f1117;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      margin-top: 8px;
      transition: background 0.15s;
    }
    .login-btn:hover { background: #22c55e; }
    .login-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    #error-msg {
      display: none;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">myhealth</div>
    <div class="login-card">
      <h1>サインイン</h1>
      <p>健康管理システムにログインしてください</p>
      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input type="email" id="email" name="email" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="login-btn" id="login-btn">ログイン</button>
        <div id="error-msg" class="error-msg"></div>
      </form>
    </div>
  </div>

  <script type="module">
    import { signIn, getSession } from './js/auth.js'

    // 既にログイン済みなら即リダイレクト
    getSession().then(session => {
      if (session) window.location.href = '/index.html'
    })

    const form = document.getElementById('login-form')
    const btn  = document.getElementById('login-btn')
    const errEl = document.getElementById('error-msg')

    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      btn.disabled = true
      btn.textContent = '確認中...'
      errEl.style.display = 'none'

      const email    = document.getElementById('email').value
      const password = document.getElementById('password').value

      const { error } = await signIn(email, password)

      if (error) {
        errEl.textContent = 'ログインに失敗しました: ' + error.message
        errEl.style.display = 'block'
        btn.disabled = false
        btn.textContent = 'ログイン'
      } else {
        window.location.href = '/index.html'
      }
    })
  </script>
</body>
</html>
